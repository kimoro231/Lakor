<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرفقة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --deep:#10172a;
    --dusk1:#1c2747;
    --dusk2:#2e3f6e;
    --amber:#f2a341;
    --amber-light:#ffce8a;
    --terracotta:#c1542c;
    --cream:#fbf1e2;
    --teal:#21a89a;
    --shadow: 0 30px 60px -20px rgba(0,0,0,.55);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    min-height:100vh;
    background:
      radial-gradient(60% 50% at 50% 0%, rgba(242,163,65,.18), transparent 60%),
      linear-gradient(180deg, var(--deep) 0%, var(--dusk1) 45%, var(--dusk2) 100%);
    font-family:'Tajawal', sans-serif;
    color:var(--cream);
    overflow-x:hidden;
    position:relative;
  }

  /* ambient drifting sun glow */
  .sunglow{
    position:fixed;
    top:-20vh; left:50%;
    width:70vw; height:70vw;
    max-width:900px; max-height:900px;
    transform:translateX(-50%);
    background:radial-gradient(circle, rgba(242,163,65,.25) 0%, rgba(193,84,44,.10) 45%, transparent 70%);
    filter:blur(10px);
    animation: drift 14s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
  }
  @keyframes drift{
    0%,100%{ transform:translateX(-50%) translateY(0) scale(1); }
    50%{ transform:translateX(-48%) translateY(20px) scale(1.05); }
  }

  /* floating dust particles */
  .particle{
    position:fixed;
    bottom:-10px;
    border-radius:50%;
    background: var(--amber-light);
    opacity:.55;
    pointer-events:none;
    z-index:0;
    animation-name: rise;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  @keyframes rise{
    0%{ transform: translateY(0) translateX(0); opacity:0; }
    10%{ opacity:.6; }
    90%{ opacity:.4; }
    100%{ transform: translateY(-110vh) translateX(var(--drift,20px)); opacity:0; }
  }

  .wrap{
    position:relative;
    z-index:2;
    max-width:1000px;
    margin:0 auto;
    padding: 9vh 6vw 12vh;
  }

  header.hero{
    text-align:center;
    margin-bottom:8vh;
  }
  .eyebrow{
    margin:0 0 6px;
    font-size:13px;
    letter-spacing:.12em;
    color:var(--amber-light);
    opacity:.8;
    font-weight:500;
  }
  h1.title{
    font-family:'Lalezar', sans-serif;
    font-weight:400;
    font-size:clamp(48px, 9vw, 88px);
    line-height:1;
    margin:0 0 10px;
    background: linear-gradient(95deg, var(--amber-light) 10%, var(--amber) 45%, var(--terracotta) 85%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter: drop-shadow(0 6px 24px rgba(242,163,65,.25));
  }
  .subtitle{
    margin:0;
    font-size:clamp(15px,2.4vw,18px);
    color:var(--cream);
    opacity:.65;
    font-weight:400;
  }

  .gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    perspective:1400px;
  }

  .card{
    width:270px;
    max-width:84vw;
    opacity:0;
    transform: translateY(26px);
    transition: opacity .7s ease, transform .7s ease;
  }
  .card.in-view{
    opacity:1;
    transform:translateY(0);
  }

  .card-inner{
    position:relative;
    border-radius:26px;
    overflow:hidden;
    transform-style:preserve-3d;
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
    box-shadow: var(--shadow);
    cursor:pointer;
  }

  .glow{
    position:absolute;
    inset:-30%;
    background: radial-gradient(circle at 50% 30%, rgba(242,163,65,.55), transparent 60%);
    opacity:.35;
    transition: opacity .35s ease;
    z-index:0;
    pointer-events:none;
  }
  .card-inner:hover .glow{ opacity:.7; }

  .ring{
    position:absolute;
    inset:0;
    border-radius:26px;
    padding:2px;
    background: conic-gradient(from 0deg, var(--amber), var(--teal), var(--terracotta), var(--amber));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    opacity:0;
    transition: opacity .35s ease;
    animation: spin 6s linear infinite;
    z-index:3;
    pointer-events:none;
  }
  .card-inner:hover .ring{ opacity:.9; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .photo{
    display:block;
    width:100%;
    aspect-ratio: 3/4;
    object-fit:cover;
    position:relative;
    z-index:1;
    transform: scale(1.0);
    transition: transform .5s ease, filter .5s ease;
    filter: saturate(1.05) contrast(1.03);
  }
  .card-inner:hover .photo{
    transform: scale(1.07);
  }

  .sheen{
    position:absolute;
    inset:0;
    z-index:2;
    background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,.35) 50%, transparent 60%);
    transform: translateX(-120%);
    pointer-events:none;
  }
  .card-inner:hover .sheen{
    animation: sheen-sweep 1s ease forwards;
  }
  @keyframes sheen-sweep{
    to{ transform: translateX(120%); }
  }

  .nameplate{
    position:absolute;
    left:0; right:0; bottom:0;
    z-index:4;
    padding:34px 16px 16px;
    text-align:center;
    background: linear-gradient(to top, rgba(10,14,26,.92) 10%, rgba(10,14,26,.55) 55%, transparent 100%);
    transform: translateY(60%);
    opacity:0;
    transition: transform .6s cubic-bezier(.2,.9,.25,1.4), opacity .5s ease;
    transition-delay: var(--delay, 0s);
  }
  .card.in-view .nameplate{
    transform: translateY(0);
    opacity:1;
  }

  .name{
    display:block;
    font-family:'Lalezar', sans-serif;
    font-size:26px;
    color:var(--cream);
    letter-spacing:.02em;
  }
  .nickname{
    display:block;
    margin-top:2px;
    font-size:12.5px;
    color:var(--amber-light);
    opacity:.85;
    font-weight:500;
  }
  .underline{
    display:block;
    width:0;
    height:2px;
    margin:8px auto 0;
    background: linear-gradient(90deg, var(--amber), var(--teal));
    transition: width .5s ease .2s;
  }
  .card.in-view .underline{ width:38px; }

  footer{
    position:relative;
    z-index:2;
    text-align:center;
    padding-bottom:6vh;
    font-size:12px;
    color:var(--cream);
    opacity:.35;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>

<footer>صُنعت بود لِلرفقة</footer>

<script>
  // entrance animation
  const cards = document.querySelectorAll('.card');
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('in-view');
      }
    });
  }, {threshold:.2});
  cards.forEach(c=>io.observe(c));

  // 3D tilt on pointer move (desktop)
  document.querySelectorAll('[data-tilt]').forEach(card=>{
    const inner = card.querySelector('.card-inner');
    const maxTilt = 12;

    card.addEventListener('mousemove', (e)=>{
      const rect = inner.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      const rotateY = (x - .5) * maxTilt * 2;
      const rotateX = (.5 - y) * maxTilt * 2;
      inner.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
    });

    card.addEventListener('mouseleave', ()=>{
      inner.style.transform = 'rotateX(0) rotateY(0) scale(1)';
    });

    // gentle auto-tilt nudge for touch devices on tap
    card.addEventListener('touchstart', ()=>{
      inner.style.transform = 'rotateX(4deg) rotateY(-6deg) scale(1.02)';
      setTimeout(()=>{ inner.style.transform = 'rotateX(0) rotateY(0) scale(1)'; }, 500);
    }, {passive:true});

    // little surprise burst on click
    card.addEventListener('click', ()=> burst(card));
  });

  function burst(card){
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height*0.18;
    const colors = ['#f2a341','#ffce8a','#21a89a','#c1542c','#fbf1e2'];
    for(let i=0;i<22;i++){
      const p = document.createElement('div');
      const size = 5 + Math.random()*5;
      p.style.position='fixed';
      p.style.left = cx+'px';
      p.style.top = cy+'px';
      p.style.width = size+'px';
      p.style.height = size+'px';
      p.style.borderRadius='50%';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.pointerEvents='none';
      p.style.zIndex = 999;
      const angle = Math.random()*Math.PI*2;
      const dist = 60 + Math.random()*90;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist - 40;
      p.animate([
        { transform:'translate(0,0) scale(1)', opacity:1 },
        { transform:`translate(${dx}px, ${dy}px) scale(.4)`, opacity:0 }
      ], { duration: 700 + Math.random()*400, easing:'cubic-bezier(.2,.7,.3,1)' });
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 1200);
    }
  }

  // ambient floating dust particles
  const pHost = document.getElementById('particles');
  const N = 16;
  for(let i=0;i<N;i++){
    const d = document.createElement('div');
    d.className='particle';
    const size = 2 + Math.random()*3;
    d.style.width = size+'px';
    d.style.height = size+'px';
    d.style.left = (Math.random()*100)+'vw';
    d.style.setProperty('--drift', (Math.random()*60-30)+'px');
    d.style.animationDuration = (10 + Math.random()*10)+'s';
    d.style.animationDelay = (Math.random()*10)+'s';
    pHost.appendChild(d);
  }
</script>
